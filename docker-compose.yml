version: "3.9"

services:
  scriptorium:
    build: .
    container_name: scriptorium-mcp
    environment:
      - SCRIPTORIUM_PROJECTS=/data/projects
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=scriptorium_password
    volumes:
      - scriptorium_projects:/data/projects
    depends_on:
      neo4j:
        condition: service_healthy
    stdin_open: true
    tty: true

  neo4j:
    image: neo4j:5.18-community
    container_name: scriptorium-neo4j
    environment:
      - NEO4J_AUTH=neo4j/scriptorium_password
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    ports:
      - "7474:7474"   # Neo4j Browser UI
      - "7687:7687"   # Bolt protocol
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "scriptorium_password", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

volumes:
  scriptorium_projects:
  neo4j_data:
  neo4j_logs:
